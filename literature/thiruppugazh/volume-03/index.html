<section class="osb-lit-hero"><span class="osb-badge">Batch 18</span><h1>திருப்புகழ் தொகுதி 03</h1>
<p class="osb-note">இந்த தொகுதி திருப்புகழ் பாடல்களை படிப்படியாக இணையதள வாசிப்பு வடிவத்திற்கு கொண்டு வரும் பாதுகாப்பான வெளியீடு. மூல உரை சரிபார்ப்பு நிலை ஒவ்வொரு பாடலிலும் தனியாகக் காட்டப்பட்டுள்ளது.</p>
