<!doctype html><html lang="ta"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>சித்ரா பௌர்ணமி வழிபாடு</title><link rel="stylesheet" href="../../../assets/css/festival-encyclopedia.css"></head><body><main class="osb-wrap"><a href="index.html">← சித்ரா பௌர்ணமி</a><section class="osb-hero"><h1>சித்ரா பௌர்ணமி - வழிபாட்டு வழிகாட்டி</h1><p class="osb-note">இந்த பக்கம் சித்ரா பௌர்ணமி தொடர்பான விரதம், பூஜை, பாராயணம், பக்தி வழிமுறைகள் மற்றும் குடும்ப வழிபாடு அமைப்பிற்கான foundation.</p></section></main></body></html>
