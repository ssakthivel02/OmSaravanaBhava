<!doctype html><html lang="ta"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>கார்த்திகை தீபம் வழிபாடு</title><link rel="stylesheet" href="../../../assets/css/festival-encyclopedia.css"></head><body><main class="osb-wrap"><a href="index.html">← கார்த்திகை தீபம்</a><section class="osb-hero"><h1>கார்த்திகை தீபம் - வழிபாட்டு வழிகாட்டி</h1><p class="osb-note">இந்த பக்கம் கார்த்திகை தீபம் தொடர்பான விரதம், பூஜை, பாராயணம், பக்தி வழிமுறைகள் மற்றும் குடும்ப வழிபாடு அமைப்பிற்கான foundation.</p></section></main></body></html>
