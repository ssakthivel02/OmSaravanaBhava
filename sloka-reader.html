<!doctype html>
<html lang="ta">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sloka Reader | Om Saravana Bhava</title>
  <meta name="description" content="Tamil and English devotional sloka reader for Om Saravana Bhava." />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="css/final-hotfix.css" />
</head>
<body>
  <div class="top-strip">🛕 ஓம் சரவணபவ · Verified Murugan devotional knowledge platform</div>
  <header class="site-header clean-header">
    <a class="brand" href="index.html">ஓம் சரவணபவ</a>
    <nav class="main-nav" aria-label="Main navigation">
      <a href="index.html">Home</a><a href="temples.html">Temples</a><a href="festivals.html">Festivals</a><a href="slokas.html">Slokas</a><a href="audio-library.html">Audio</a><a href="media-library.html">Media</a>
    </nav>
  </header>
  <main class="page-shell">
    <section class="hero-card reader-hero">
      <p class="eyebrow">Batch-16 Reader</p>
      <h1>Sloka Reader</h1>
      <p>Focused Tamil + English reader with meaning, benefits, practice notes and source-review status.</p>
    </section>
    <section id="reader" class="reader-card">Loading...</section>

    <button type="button" onclick="document.body.classList.toggle('night-mode')">☾ Night</button>
    <button type="button" onclick="localStorage.setItem('savedPage', location.href); alert('Saved')">♡ Save</button>
    <button type="button" onclick="navigator.clipboard?.writeText(location.href); alert('Link copied')">↗ Share</button>
  </div>
