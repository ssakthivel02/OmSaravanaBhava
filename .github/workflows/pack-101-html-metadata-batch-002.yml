name: Pack 101 HTML Metadata Batch 002

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tools/pack-101/apply_html_metadata_batch_002.py'
      - '.github/workflows/pack-101-html-metadata-batch-002.yml'

permissions:
  contents: write

concurrency:
  group: pack-101-html-metadata-batch-002
  cancel-in-progress: true

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply metadata batch 002
        run: python tools/pack-101/apply_html_metadata_batch_002.py

      - name: Validate changed HTML and rollback manifest
        run: |
          python -m json.tool reports/pack-101/metadata-batch-002/rollback-manifest.json > /dev/null
          test -f reports/pack-101/metadata-batch-002/SUMMARY.md
          python - <<'PY'
          import json
          from pathlib import Path
          m=json.loads(Path('reports/pack-101/metadata-batch-002/rollback-manifest.json').read_text())
          assert m['changed_count'] > 0
          assert m['changed_count'] <= 50
          assert m['safety']['files_deleted'] == 0
          for row in m['changed']:
              text=Path(row['path']).read_text(encoding='utf-8')
              assert 'name="viewport"' in text
              assert 'name="description"' in text
          print(f"Validated {m['changed_count']} metadata repairs")
          PY

      - name: Commit controlled metadata repairs
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add '*.html' crossref reports/pack-101/metadata-batch-002
          if git diff --cached --quiet; then
            echo 'No metadata repairs to commit.'
          else
            git commit -m 'fix: apply Pack 101 HTML metadata batch 002'
            git push
          fi
