name: Release Governance Gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Discover release state
        id: release
        run: |
          manifest="$(python -m tools.release_control.discovery --root .)"
          echo "manifest=$manifest" >> "$GITHUB_OUTPUT"
          MANIFEST="$manifest" python - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          from pathlib import Path
          p=json.loads(Path(os.environ['MANIFEST']).read_text(encoding='utf-8'))
          print(f"number={p['release']}")
          print(f"closure={p.get('closure',{}).get('state','none')}")
          PY
      - name: Validate pending closure stage
        if: steps.release.outputs.closure == 'pending'
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: python -B -m tools.release_closure.validate --root . --mode pending
      - name: Validate finalized repository
        if: steps.release.outputs.closure != 'pending'
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          python -B -m tools.repository_hygiene.validate --root .
          python -B -m tools.repository_integrity.validate --root . --manifest "${{ steps.release.outputs.manifest }}"
          python -B -m tools.effective_route_consumers.validate --root .
          python -B -m tools.deployment_conformance.validate --root .
          node --test tests/js/*.test.mjs
          python -B -m unittest discover -s tests -p 'test_*.py' -v
          python -B tools/release_validate.py --root . --manifest "${{ steps.release.outputs.manifest }}" --repository-mode
