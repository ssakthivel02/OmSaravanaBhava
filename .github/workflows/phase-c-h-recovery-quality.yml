name: Phase C-H Recovery and Quality Programme

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tools/phase-c-h/**'
      - 'schemas/**'
      - 'data/site-routes.json'
      - 'data/site-routes-additions.json'
      - 'data/site-routes-effective-overrides.json'
      - 'data/murugan-song-library.json'
      - 'data/thiruppugazh.json'
      - 'sitemap.xml'
      - 'sitemap-songs.xml'
      - '.github/workflows/phase-c-h-recovery-quality.yml'

permissions:
  contents: write

concurrency:
  group: phase-c-h-recovery-quality
  cancel-in-progress: true

jobs:
  recovery-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Phase D-E route classification and link recovery
        run: python tools/phase-c-h/build_route_recovery.py

      - name: Validate generated recovery records
        run: |
          python -m json.tool data/route-recovery-summary.json > /dev/null
          python -m json.tool data/route-aliases.json > /dev/null
          test -s reports/phase-d-e-route-recovery/SUMMARY.md
          python - <<'PY'
          import json
          from pathlib import Path
          summary=json.loads(Path('data/route-recovery-summary.json').read_text(encoding='utf-8'))
          assert summary['safety']['filesDeleted'] == 0
          assert summary['safety']['productionHtmlModified'] == 0
          assert summary['htmlFilesScanned'] > 0
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          PY

      - name: Upload full recovery artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase-c-h-route-recovery
          path: artifacts/phase-d-e-route-recovery/*.json.gz
          if-no-files-found: error
          retention-days: 30

      - name: Commit compact recovery evidence
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/route-recovery-summary.json data/route-aliases.json reports/phase-d-e-route-recovery
          if git diff --cached --quiet; then
            echo 'No Phase D-E report changes to commit.'
          else
            git commit -m 'chore: add Phase D-E route recovery evidence'
            git push
          fi
