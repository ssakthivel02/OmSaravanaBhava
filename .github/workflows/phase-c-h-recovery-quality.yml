name: Phase C-H Recovery and Quality Programme

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tools/phase-c-h/**'
      - 'schemas/**'
      - 'data/site-routes.json'
      - 'data/site-routes-additions.json'
      - 'data/site-routes-effective-overrides.json'
      - 'data/murugan-song-library.json'
      - 'data/thiruppugazh.json'
      - 'data/audio-catalog.json'
      - 'reports/pack-101/canonical-song-registry/**'
      - 'sitemap.xml'
      - 'sitemap-songs.xml'
      - 'sitemap-platform.xml'
      - '.github/workflows/phase-c-h-recovery-quality.yml'

permissions:
  contents: write

concurrency:
  group: phase-c-h-recovery-quality
  cancel-in-progress: true

jobs:
  recovery-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install schema validator
        run: python -m pip install --disable-pip-version-check jsonschema==4.23.0

      - name: Compile Phase C-H tools
        run: |
          python -m py_compile \
            tools/phase-c-h/build_route_recovery.py \
            tools/phase-c-h/build_content_completeness.py \
            tools/phase-c-h/build_capability_matrix.py

      - name: Phase D-E route classification and link recovery
        run: python tools/phase-c-h/build_route_recovery.py

      - name: Phase F content completeness and research queue
        run: python tools/phase-c-h/build_content_completeness.py

      - name: Reconcile planned versus connected capabilities
        run: python tools/phase-c-h/build_capability_matrix.py

      - name: Validate generated governance records
        run: |
          python -m json.tool data/route-recovery-summary.json > /dev/null
          python -m json.tool data/route-aliases.json > /dev/null
          python -m json.tool data/content-completeness.json > /dev/null
          python -m json.tool data/platform-capability-matrix.json > /dev/null
          python -m json.tool schemas/murugan-song-record.schema.json > /dev/null
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator
          schema=json.loads(Path('schemas/murugan-song-record.schema.json').read_text(encoding='utf-8'))
          Draft202012Validator.check_schema(schema)
          recovery=json.loads(Path('data/route-recovery-summary.json').read_text(encoding='utf-8'))
          completeness=json.loads(Path('data/content-completeness.json').read_text(encoding='utf-8'))
          capabilities=json.loads(Path('data/platform-capability-matrix.json').read_text(encoding='utf-8'))
          assert recovery['safety']['filesDeleted'] == 0
          assert recovery['safety']['productionHtmlModified'] == 0
          assert recovery['htmlFilesScanned'] > 0
          assert completeness['safety']['lyricsGeneratedByAudit'] == 0
          assert completeness['safety']['unreviewedTextPublished'] == 0
          assert completeness['safety']['recordingsPublishedWithoutRights'] == 0
          assert capabilities['safety']['filesDeleted'] == 0
          assert capabilities['capabilityCount'] > 0
          print(json.dumps({
            'recovery': {
              'htmlFilesScanned': recovery['htmlFilesScanned'],
              'canonicalBrokenReferences': recovery['unresolvedReferencesFromCanonicalPages'],
              'safeRepairs': recovery['uniqueSafeRepairsOnCanonicalPages']
            },
            'content': {
              'governedCollections': completeness['governedCollections'],
              'canonicalFullSongRecords': completeness['canonicalFullSongRecords'],
              'popularSourceRequests': completeness['popularSourceRequests']
            },
            'capabilities': {
              'count': capabilities['capabilityCount'],
              'statusCounts': capabilities['statusCounts']
            }
          }, ensure_ascii=False, indent=2))
          PY
          test -s reports/phase-d-e-route-recovery/SUMMARY.md
          test -s reports/phase-f-content-completeness/SUMMARY.md
          test -s reports/phase-c-h-capability-matrix/SUMMARY.md
          test -s research-prompts/GEMINI-MANUS-MURUGAN-SOURCE-COLLECTION.md

      - name: Upload full recovery artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase-c-h-route-recovery
          path: artifacts/phase-d-e-route-recovery/*.json.gz
          if-no-files-found: error
          retention-days: 30

      - name: Commit compact Phase C-H evidence
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            data/route-recovery-summary.json \
            data/route-aliases.json \
            data/content-completeness.json \
            data/platform-capability-matrix.json \
            reports/phase-d-e-route-recovery \
            reports/phase-f-content-completeness \
            reports/phase-c-h-capability-matrix \
            research-prompts/GEMINI-MANUS-MURUGAN-SOURCE-COLLECTION.md
          if git diff --cached --quiet; then
            echo 'No Phase C-H evidence changes to commit.'
          else
            git commit -m 'chore: add Phase C-H recovery completeness and capability evidence'
            git push
          fi
