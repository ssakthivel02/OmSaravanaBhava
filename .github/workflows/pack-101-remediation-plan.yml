name: Pack 101 Remediation Plan

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/pack-101-remediation-plan.yml'
      - 'tools/pack-101/build_remediation_plan.py'
      - 'repository-quality-audit.json'
      - 'route-inventory.json'
      - 'workflow-inventory.json'

permissions:
  contents: write

concurrency:
  group: pack-101-remediation-plan
  cancel-in-progress: true

jobs:
  build-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate non-destructive remediation queues
        run: python tools/pack-101/build_remediation_plan.py

      - name: Validate generated reports
        run: |
          test -f reports/pack-101/PACK-101-SUMMARY.md
          test -f reports/pack-101/pack-101-remediation-plan.json
          python -m json.tool reports/pack-101/pack-101-remediation-plan.json > /dev/null

      - name: Commit Pack 101 reports
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reports/pack-101
          if git diff --cached --quiet; then
            echo 'No Pack 101 report changes.'
          else
            git commit -m 'chore: generate Pack 101 remediation queues'
            git push
          fi
