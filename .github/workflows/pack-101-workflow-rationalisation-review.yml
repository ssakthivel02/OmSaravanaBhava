name: Pack 101 Workflow Rationalisation Review

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tools/pack-101/review_push_workflows.py'
      - '.github/workflows/pack-101-workflow-rationalisation-review.yml'

permissions:
  contents: write

concurrency:
  group: pack-101-workflow-rationalisation-review
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate workflow rationalisation report
        run: python tools/pack-101/review_push_workflows.py

      - name: Validate report
        run: |
          python -m json.tool reports/pack-101/workflow-rationalisation/workflow-rationalisation.json > /dev/null
          test -f reports/pack-101/workflow-rationalisation/SUMMARY.md
          python - <<'PY'
          import json
          from pathlib import Path
          report=json.loads(Path('reports/pack-101/workflow-rationalisation/workflow-rationalisation.json').read_text())
          assert report['workflow_count'] == 7
          assert report['files_deleted'] == 0
          assert report['workflows_disabled'] == 0
          print('Workflow review validated')
          PY

      - name: Commit review reports
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reports/pack-101/workflow-rationalisation
          if git diff --cached --quiet; then
            echo 'No review changes to commit.'
          else
            git commit -m 'chore: add Pack 101 workflow rationalisation report'
            git push
          fi
