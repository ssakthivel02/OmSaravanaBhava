name: Pack 101 Reachability and Murugan Song Audit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tools/pack-101/build_reachability_and_song_inventory.py'
      - '.github/workflows/pack-101-reachability-song-audit.yml'

permissions:
  contents: write

concurrency:
  group: pack-101-reachability-song-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build reachability and song inventory
        run: python tools/pack-101/build_reachability_and_song_inventory.py

      - name: Validate compact reports
        run: |
          python -m json.tool reports/pack-101/reachability-song-audit/reachability-summary.json > /dev/null
          python -m json.tool reports/pack-101/reachability-song-audit/popular-song-coverage.json > /dev/null
          python -m json.tool reports/pack-101/reachability-song-audit/route-hub-plan.json > /dev/null
          test -s reports/pack-101/reachability-song-audit/SUMMARY.md
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('reports/pack-101/reachability-song-audit/reachability-summary.json')
          data=json.loads(p.read_text(encoding='utf-8'))
          assert data['safety']['files_deleted'] == 0
          assert data['safety']['production_files_modified'] == 0
          assert data['total_files'] > 0
          assert data['html_routes'] > 0
          print(json.dumps(data, indent=2, ensure_ascii=False))
          PY

      - name: Upload full audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pack-101-reachability-song-audit
          path: artifacts/pack-101/reachability-song-audit/*.json.gz
          if-no-files-found: error
          retention-days: 30

      - name: Commit compact audit reports
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reports/pack-101/reachability-song-audit
          if git diff --cached --quiet; then
            echo 'No compact report changes to commit.'
          else
            git commit -m 'chore: add full reachability and Murugan song audit reports'
            git push
          fi
