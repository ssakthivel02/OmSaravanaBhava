name: Pack 101 Canonical Murugan Song Registry

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tools/pack-101/build_canonical_song_registry.py'
      - '.github/workflows/pack-101-canonical-song-registry.yml'
      - 'data/thiruppugazh.json'
      - 'data/murugan-song-library.json'
      - 'data/audio-catalog.json'
      - 'data/slokas/index.json'

permissions:
  contents: write

concurrency:
  group: pack-101-canonical-song-registry
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build strict canonical song registry
        run: python tools/pack-101/build_canonical_song_registry.py

      - name: Validate reports and safety boundary
        run: |
          python -m json.tool reports/pack-101/canonical-song-registry/SUMMARY.json > /dev/null
          python -m json.tool reports/pack-101/canonical-song-registry/canonical-song-registry.json > /dev/null
          python -m json.tool reports/pack-101/canonical-song-registry/popular-song-canonical-coverage.json > /dev/null
          test -s reports/pack-101/canonical-song-registry/MISSING-SONG-SOURCE-REQUEST.md
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('reports/pack-101/canonical-song-registry/SUMMARY.json')
          data=json.loads(p.read_text(encoding='utf-8'))
          assert data['safety']['filesDeleted'] == 0
          assert data['safety']['productionFilesModifiedByAudit'] == 0
          assert data['canonicalFullSongRecords'] > 0
          print(json.dumps(data, ensure_ascii=False, indent=2))
          PY

      - name: Upload canonical registry reports
        uses: actions/upload-artifact@v4
        with:
          name: pack-101-canonical-song-registry
          path: reports/pack-101/canonical-song-registry
          if-no-files-found: error
          retention-days: 30

      - name: Commit compact canonical reports
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reports/pack-101/canonical-song-registry
          if git diff --cached --quiet; then
            echo 'No canonical song report changes.'
          else
            git commit -m 'chore: add strict canonical Murugan song registry reports'
            git push
          fi
