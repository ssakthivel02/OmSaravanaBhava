name: Production Baseline

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-baseline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate permanent baseline
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        shell: bash
        run: |
          mode=package
          if [ "${{ github.event_name }}" = "push" ]; then mode=final; fi
          python -B -m tools.production_baseline.validate --root . --mode "$mode"
          python -B -m tools.deployment_conformance.validate --root .
          python -B -m tools.effective_route_consumers.validate --root .
          python -B -m tools.repository_hygiene.validate --root .
          python -B -m tools.repository_integrity.validate --root . --manifest manifest-release-243.json
      - name: Run regression suites
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          node --test tests/js/*.test.mjs
          python -B -m unittest discover -s tests -p "test_*.py" -v
