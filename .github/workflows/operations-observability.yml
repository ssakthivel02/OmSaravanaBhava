
name: Operations Observability

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: operations-observability-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate operations catalogue and deployment attestation
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        shell: bash
        run: |
          mode=package
          if [ "${{ github.event_name }}" = "push" ]; then mode=final; fi
          python -B -m tools.operations_observability.validate --root . --mode "$mode" --report artifacts/operations-observability-report.json
      - name: Run operations regression tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          node --test tests/js/operations-observability.test.mjs
          python -B -m unittest discover -s tests/operations_observability -p "test_*.py" -v
      - name: Upload operations evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-244-operations-observability
          path: artifacts/operations-observability-report.json
          if-no-files-found: error
          retention-days: 90
