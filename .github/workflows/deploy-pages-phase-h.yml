name: Phase H Validated GitHub Pages Deployment

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: github-pages-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Checkout complete repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Compile Phase C-H Python tooling
        run: |
          python -m py_compile \
            tools/phase-c-h/build_route_recovery.py \
            tools/phase-c-h/run_route_recovery.py \
            tools/phase-c-h/build_content_completeness.py \
            tools/phase-c-h/build_capability_matrix.py \
            tools/phase-c-h/build_public_site.py \
            tools/phase-c-h/validate_public_site.py

      - name: Generate Phase D-E recovery evidence
        run: python tools/phase-c-h/run_route_recovery.py

      - name: Generate Phase F completeness evidence
        run: python tools/phase-c-h/build_content_completeness.py

      - name: Validate governed research intake
        run: |
          python -m json.tool data/research-intake/attachment-song-evidence-2026-07-22.json > /dev/null
          python -m json.tool data/research-intake/popular-song-triage-2026-07-22.json > /dev/null
          python - <<'PY'
          import json
          from pathlib import Path

          attachment = json.loads(Path('data/research-intake/attachment-song-evidence-2026-07-22.json').read_text(encoding='utf-8'))
          triage = json.loads(Path('data/research-intake/popular-song-triage-2026-07-22.json').read_text(encoding='utf-8'))
          assert attachment['attachmentReview']['htmlFilesAcceptedAsProductionPages'] == 0
          assert attachment['attachmentReview']['recordsTriaged'] == 5
          assert len(triage['records']) >= 16
          assert all(record.get('triageStatus') for record in triage['records'])
          assert all(record.get('publicationDecision') for record in triage['records'])
          print(json.dumps({
            'attachmentRecords': len(attachment['records']),
            'triageRecords': len(triage['records']),
            'protectedLyricsPublished': 0,
            'unlicensedAudioPublished': 0
          }, ensure_ascii=False, indent=2))
          PY

      - name: Reconcile planned versus connected capabilities
        run: python tools/phase-c-h/build_capability_matrix.py

      - name: Build deterministic public artifact
        run: python tools/phase-c-h/build_public_site.py

      - name: Stage governed research data in public artifact
        run: |
          mkdir -p _site/data/research-intake
          cp data/research-intake/popular-song-triage-2026-07-22.json \
            _site/data/research-intake/popular-song-triage-2026-07-22.json

      - name: Validate research data is in public artifact
        run: |
          test -s _site/data/research-intake/popular-song-triage-2026-07-22.json
          python -m json.tool _site/data/research-intake/popular-song-triage-2026-07-22.json > /dev/null

      - name: Validate critical JavaScript modules
        run: |
          node --check assets/js/release-246.js
          node --check assets/js/murugan-song-library.js
          node --check assets/js/advanced-search.js
          node --check assets/js/404-suggestions.js
          node --check assets/js/effective-route-registry.mjs
          node --check assets/js/premium-platform-2026.mjs
          node --check assets/js/platform-hub-2026.mjs
          node --check assets/js/route-recovery-2026.mjs
          node --check assets/js/content-completeness-2026.mjs
          node --check assets/js/platform-roadmap-2026.mjs
          node --check service-worker.js

      - name: Run Phase H static production gate
        run: python tools/phase-c-h/validate_public_site.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Upload Phase H validation evidence
        uses: actions/upload-artifact@v7
        with:
          name: phase-h-validation-evidence
          path: |
            reports/phase-d-e-route-recovery
            reports/phase-f-content-completeness
            reports/phase-f-attachment-review
            reports/phase-c-h-capability-matrix
            reports/phase-h-deployment
            reports/phase-h-validation
            research-prompts/MISSING-MURUGAN-SONGS-VERIFICATION-BATCH-02.md
            data/research-intake
            data/route-recovery-summary.json
            data/content-completeness.json
            data/platform-capability-matrix.json
            _site/deployment-manifest.json
          if-no-files-found: error
          retention-days: 30

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - name: Deploy validated artifact to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
