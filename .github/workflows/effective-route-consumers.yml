name: Effective Route Consumers

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: effective-route-consumers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  route-consumers:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate explicit consumers
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -B -m tools.effective_route_consumers.validate --root .
      - name: Validate baseline contract
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -B -m tools.production_baseline.validate --root . --mode package
      - name: Run consumer tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          node --test tests/js/*.test.mjs
          python -B -m unittest discover -s tests/effective_route_consumers -p "test_*.py" -v
