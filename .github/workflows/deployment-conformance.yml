name: Deployment Conformance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deployment-conformance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deployment:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate deployment contracts
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python -B -m tools.deployment_conformance.validate --root .

      - name: Run route-consumer browser tests
        run: |
          node --test tests/js/*.test.mjs

      - name: Run deployment and transaction tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python -B -m unittest discover \
            -s tests/deployment_conformance \
            -p "test_*.py" \
            -v
          python -B -m unittest discover \
            -s tests/release_transaction \
            -p "test_*.py" \
            -v
