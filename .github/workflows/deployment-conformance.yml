name: Deployment Conformance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deployment-conformance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deployment:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate deployment contract
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -B -m tools.deployment_conformance.validate --root .
      - name: Run deployment tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          node --test tests/js/*.test.mjs
          python -B -m unittest discover -s tests/deployment_conformance -p "test_*.py" -v
