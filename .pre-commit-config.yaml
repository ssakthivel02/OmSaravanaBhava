repos:
  - repo: local
    hooks:
      - id: repository-hygiene
        name: Repository hygiene
        entry: python -B -m tools.repository_hygiene.validate --root .
        language: system
        pass_filenames: false
      - id: repository-integrity
        name: Repository integrity
        entry: python -B -m tools.repository_integrity.validate --root .
        language: system
        pass_filenames: false
      - id: effective-route-consumers
        name: Effective route consumers
        entry: python -B -m tools.effective_route_consumers.validate --root .
        language: system
        pass_filenames: false
      - id: release-tests
        name: Release regression suites
        entry: python -B scripts/release237/run-release-tests.py --root .
        language: system
        pass_filenames: false
