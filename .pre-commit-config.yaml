repos:
  - repo: local
    hooks:
      - id: release-tests
        name: Release 240 regression suites
        entry: python -B scripts/release240/run-release-tests.py --root .
        language: system
        pass_filenames: false
      - id: repository-hygiene
        name: Repository hygiene
        entry: python -B -m tools.repository_hygiene.validate --root .
        language: system
        pass_filenames: false
      - id: deployment-conformance
        name: Deployment conformance
        entry: python -B -m tools.deployment_conformance.validate --root .
        language: system
        pass_filenames: false
