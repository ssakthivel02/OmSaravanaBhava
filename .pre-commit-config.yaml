repos:
  - repo: local
    hooks:
      - id: release-tests
        name: Release 239 regression suites
        entry: python -B scripts/release239/run-release-tests.py --root .
        language: system
        pass_filenames: false
      - id: atomic-publisher
        name: Atomic publisher contract
        entry: python -B -m tools.atomic_publisher.validate --root . --mode package
        language: system
        pass_filenames: false
      - id: repository-hygiene
        name: Repository hygiene
        entry: python -B -m tools.repository_hygiene.validate --root .
        language: system
        pass_filenames: false
