<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Offline | இணைய இணைப்பு இல்லை - Om Saravana Bhava</title>
    <meta name="description" content="You are currently offline. Please restore your connection to view the latest Panchangam and Temple info.">
    <meta name="theme-color" content="#ff9900">
    <link rel="manifest" href="/manifest.json">
    <style>
        body { margin: 0; padding: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f9f9f9; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .container { padding: 40px 20px; max-width: 600px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 2.5rem; color: #d32f2f; margin: 0 0 10px 0; }
        h2 { font-size: 1.25rem; margin: 0 0 20px 0; color: #444; }
        p { font-size: 1rem; line-height: 1.5; margin-bottom: 30px; color: #666; }
        button { display: inline-block; padding: 12px 24px; background-color: #ff9900; color: #ffffff; text-decoration: none; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background-color 0.3s ease; font-size: 1rem; }
        button:hover, button:focus { background-color: #e68a00; outline: 2px solid #333; outline-offset: 2px; }
        #status-indicator { margin-top: 15px; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>
    <div class="container" role="main">
        <h1 lang="ta">இணைய இணைப்பு இல்லை</h1>
        <h2>You are currently offline</h2>
        <p>Please check your internet connection to access the Daily Panchangam and Temple updates. The page will automatically reload when your connection is restored.</p>
        <button onclick="window.location.reload()" aria-label="Retry connection">மீண்டும் முயற்சிக்க (Retry)</button>
        <div id="status-indicator" aria-live="polite">Waiting for connection...</div>
    </div>
    <script>
        window.addEventListener('online', () => {
            document.getElementById('status-indicator').innerText = 'Connection restored! Reloading...';
            document.getElementById('status-indicator').style.color = 'green';
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => {
                    console.log('SW Registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
